  originalFilename: strmcnik_2010_enhanced_880_fig2tr_black.csv
figureDescription:
  type: raw
  measurementType: CV
  scanRate:
    value: 50
    unit: mV / s
dataDescription:
  dialect:
    delimiter: ','
    decimal: '.'
    encoding: utf-8
    headerLines: 0
    columnHeaderLines: 1
  fieldMapping: # Also map fields which should be kept unchanged.
    E / V: E # If the header consists of multiple lines, separate by " / ".
    j / uA cm-2: j
  fieldUnits:
    - name: E
      unit: V
      reference: RHE
    - name: j
      unit: uA cm-2
curation:
