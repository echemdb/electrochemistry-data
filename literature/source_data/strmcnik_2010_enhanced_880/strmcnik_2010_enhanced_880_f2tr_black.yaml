experimental:
  tags:
  - BCV
system:
  type: electrochemical
  electrolyte:
    type: aqueous
    components:
      - name: water
        type: solvent
        source:
          refinement: Millipore ultrapure water
        purity:
          grade: ultrapure
      - name: KOH
        type: base
        concentration:
          value: 0.1
          unit: mol / l
        source:
          supplier: Sigma Aldrich
    temperature:
      value: 293.15
      unit: K
  electrodes:
    - name: WE
      function: working electrode
      type: single crystal
      material: Pt
      crystallographicOrientation: '111'
      preparationProcedure:
        description:
          - inductively heated in a 3% hydrogen atmosphere at 1100 K.
          - cooled in that hydrogen atmosphere.
          - passivated with a droplet of MilliQ water.
source:
