name: Validate Examples

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "echemdb_ecdata/**"
      - "pyproject.toml"
      - ".github/workflows/validation.yml"

jobs:
  verify-file-schemas:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v7
        with: { submodules: recursive }
      - uses: prefix-dev/setup-pixi@v0.10.0
        with: { pixi-version: v0.70.2 }
      - name: validate input
        shell: pixi run bash -e {0}
        run: pixi run -e dev validate-input
