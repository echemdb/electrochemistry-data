name: Check metadata-schema version

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # Use a PAT (METADATA_SCHEMA_PAT) when available so the resulting PR
      # triggers the normal CI workflows; fall back to GITHUB_TOKEN otherwise.
      # Note: PRs created with GITHUB_TOKEN do NOT trigger other workflows.
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.METADATA_SCHEMA_PAT || secrets.GITHUB_TOKEN }}

      - name: Get latest metadata-schema release
        id: latest
        run: |
          VERSION=$(curl -sSf https://api.github.com/repos/echemdb/metadata-schema/releases/latest \
            | jq -r '.tag_name')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get current SCHEMA_VERSION from validate.py
        id: current
        run: |
          VERSION=$(grep -oP 'SCHEMA_VERSION\s*=\s*"tags/\K[^"]+' echemdb_ecdata/validate.py)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Open PR if versions differ
        if: steps.latest.outputs.version != steps.current.outputs.version
        env:
          GH_TOKEN: ${{ secrets.METADATA_SCHEMA_PAT || secrets.GITHUB_TOKEN }}
          LATEST: ${{ steps.latest.outputs.version }}
          CURRENT: ${{ steps.current.outputs.version }}
        run: |
          BRANCH="update-metadata-schema-${LATEST}"

          # Skip if an update PR for this version is already open, or the
          # branch already exists on the remote. This keeps the scheduled
          # run idempotent instead of failing every week until it is merged.
          if [ -n "$(gh pr list --head "$BRANCH" --state open --json number --jq '.[].number')" ]; then
            echo "An open PR for $BRANCH already exists; nothing to do."
            exit 0
          fi
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH already exists on the remote; nothing to do."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"

          sed -i "s|SCHEMA_VERSION = \"tags/${CURRENT}\"|SCHEMA_VERSION = \"tags/${LATEST}\"|" \
            echemdb_ecdata/validate.py

          git add echemdb_ecdata/validate.py
          git commit -m "Update metadata-schema from ${CURRENT} to ${LATEST}"
          git push origin "$BRANCH"

          gh pr create \
            --title "Update metadata-schema to ${LATEST}" \
            --body "A new release of [echemdb/metadata-schema](https://github.com/echemdb/metadata-schema/releases/tag/${LATEST}) is available.

          This PR updates \`SCHEMA_VERSION\` in \`echemdb_ecdata/validate.py\` from \`${CURRENT}\` to \`${LATEST}\`.

          Please review the [release notes](https://github.com/echemdb/metadata-schema/releases/tag/${LATEST}) and verify that the schema changes are compatible before merging." \
            --head "$BRANCH" \
            --base main
