name: Validate Examples

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    # Run on any change except pure data or documentation PRs (those are
    # covered by build.yml / quick-data-check.yml).
    paths-ignore:
      - "literature/**"
      - "data/**"
      - "doc/**"
      - "**/*.md"

jobs:
  verify-file-schemas:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v7
        with: { submodules: recursive }
      - uses: prefix-dev/setup-pixi@v0.9.6
        with: { pixi-version: v0.70.2 }
      - name: validate input
        shell: pixi run bash -e {0}
        run: pixi run -e dev validate-input
