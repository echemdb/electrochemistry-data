name: Test
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    # Run on any change except pure data or documentation PRs (those are
    # covered by build.yml / quick-data-check.yml).
    paths-ignore:
      - "literature/**"
      - "data/**"
      - "doc/**"
      - "**/*.md"

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        environment: ["python-310", "python-311", "python-312", "python-313", "python-314"]
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
    steps:
      - name: checkout
        uses: actions/checkout@v7
        with: { submodules: recursive }
      - uses: prefix-dev/setup-pixi@v0.9.6
        with: { pixi-version: v0.70.2 }
      - name: doctest
        shell: pixi run bash -e {0}
        run: pixi run -e ${{ matrix.environment }} doctest
      - name: pytest
        shell: pixi run bash -e {0}
        run: pixi run -e ${{ matrix.environment }} pytest
      - name: test building packages
        shell: pixi run bash -e {0}
        run: pixi run -e dev convert
      - name: validate generated data
        shell: pixi run bash -e {0}
        run: pixi run -e dev validate-generated
