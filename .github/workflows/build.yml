name: data
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]"

  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "literature/**"
      - "echemdb_ecdata/**"
      - "pyproject.toml"
      - ".github/workflows/build.yml"

jobs:
  github-release:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with: { submodules: recursive }
      - uses: prefix-dev/setup-pixi@v0.9.6
        with: { pixi-version: v0.67.1 }
      - name: digitize
        shell: pixi run bash -e {0}
        run: pixi run -e dev convert
      - name: validate generated data
        shell: pixi run bash -e {0}
        run: pixi run -e dev validate-generated
      - name: upload data artifact
        uses: actions/upload-artifact@v7
        with:
          name: data-${{ github.event.pull_request.number }}
          path: |
            **/generated/**
          overwrite: true
      - name: zip-data
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash -l {0}
        run: |
          zip -r data-${{ github.ref_name }}.zip data/generated
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            data-${{ github.ref_name }}.zip

      - name: Publish to Zenodo
        if: startsWith(github.ref, 'refs/tags/')
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
          ZENODO_RECORD_ID: ${{ secrets.ZENODO_RECORD_ID }}
        run: |
          # Create a new draft version of the existing Zenodo record
          DRAFT_ID=$(curl -sf -X POST \
            "https://zenodo.org/api/records/${ZENODO_RECORD_ID}/versions" \
            -H "Authorization: Bearer ${ZENODO_TOKEN}" | jq -r '.id')

          # Update metadata: set version to the current tag, keep CC-BY-4.0 license
          curl -sf -X PUT \
            "https://zenodo.org/api/records/${DRAFT_ID}/draft" \
            -H "Authorization: Bearer ${ZENODO_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"metadata\": {\"version\": \"${{ github.ref_name }}\", \"license\": {\"id\": \"cc-by-4.0\"}}}"

          # Delete files carried over from the previous version
          FILE_KEYS=$(curl -sf \
            "https://zenodo.org/api/records/${DRAFT_ID}/draft/files" \
            -H "Authorization: Bearer ${ZENODO_TOKEN}" | jq -r '.entries[].key')
          for KEY in $FILE_KEYS; do
            curl -sf -X DELETE \
              "https://zenodo.org/api/records/${DRAFT_ID}/draft/files/${KEY}" \
              -H "Authorization: Bearer ${ZENODO_TOKEN}"
          done

          # Upload the data zip
          curl -sf -X PUT \
            "https://zenodo.org/api/records/${DRAFT_ID}/draft/files/data-${{ github.ref_name }}.zip/content" \
            -H "Authorization: Bearer ${ZENODO_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@data-${{ github.ref_name }}.zip"

          # Commit the uploaded file
          curl -sf -X POST \
            "https://zenodo.org/api/records/${DRAFT_ID}/draft/files/data-${{ github.ref_name }}.zip/commit" \
            -H "Authorization: Bearer ${ZENODO_TOKEN}"

          # Publish the new version
          curl -sf -X POST \
            "https://zenodo.org/api/records/${DRAFT_ID}/draft/actions/publish" \
            -H "Authorization: Bearer ${ZENODO_TOKEN}"
